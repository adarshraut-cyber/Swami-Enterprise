<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posters | Swami Enterprise</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: url('../images/eye.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .container {
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding: 60px 40px;
      flex-wrap: wrap;
    }

    .left {
      flex: 1;
      min-width: 280px;
    }
    .left img.main-image {
      width: 380px;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
      background: #fff;
    }
    .thumbnails {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .thumbnails img {
      width: 150px;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.3s;
    }
    .thumbnails img:hover {
      border-color: #ff4d4d;
    }

    .right {
      max-width: 500px;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    h2 { font-size: 32px; margin-bottom: 10px; }
    .desc { font-size: 15px; margin-bottom: 20px; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    select, input[type="number"], input[type="text"], input[type="date"] {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      outline: none;
    }
    .price-display { margin: 15px 0; font-size: 18px; font-weight: bold; }
    button { background: #ff4d4d; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #e94444; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Images -->
    <div class="left">
      <img src="../images/posterprev.png" alt="Poster Preview" class="main-image" id="mainPreview">
      <div class="thumbnails">
        <img src="../images/poster.webp" onclick="previewImage(this)">
        <img src="../images/poster1.jpg" onclick="previewImage(this)">
        <img src="../images/poster3.png" onclick="previewImage(this)">
      </div>
    </div>

    <!-- Right Form -->
    <div class="right">
      <h2>Raised Foil Posters</h2>
      <p class="desc">
        Make your brand stand out with stunning foil & Spot UV Posters!<br>
        Printed on 300/350 GSM paper with matte or velvet finish.<br>
        Foil options: Gold, Silver, Spot UV.<br>
        Available sizes: A4, A3, A3+.<br>
        Min Order: 1 piece.
      </p>

      <label for="name">Your Name</label>
      <input type="text" id="name" required>

      <label for="orderName">Order Name</label>
      <input type="text" id="orderName" required>

      <label for="address">Address</label>
      <input type="text" id="address" required>

      <label for="size">Size</label>
      <select id="size">
        <option value="A4">A4</option>
        <option value="A3">A3</option>
        <option value="A3+">A3+</option>
      </select>

      <label for="material">Material</label>
      <select id="material">
        <option value="Lykam Matte Coated Paper">Lykam Matte Coated Paper</option>
        <option value="Lykam Glossy Coated Paper">Lykam Glossy Coated Paper</option>
      </select>

      <label for="finish">Finish</label>
      <select id="finish">
        <option value="Spot UV">Spot UV</option>
        <option value="Gold Foil">Gold Foil</option>
        <option value="Silver Foil">Silver Foil</option>
      </select>

      <label for="lamination">Lamination</label>
      <select id="lamination">
        <option value="Matte Lamination">Matte Lamination</option>
        <option value="Velvet Lamination">Velvet Lamination</option>
      </select>

      <label for="orientation">Orientation</label>
      <select id="orientation">
        <option value="Portrait">Portrait</option>
        <option value="Landscape">Landscape</option>
      </select>

      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" min="1" value="1">

      <!-- Dates -->
      <label for="todayDate">Start Date</label>
      <input type="text" id="todayDate" readonly>

      <label for="deliveryDate">End Date (Delivery)</label>
      <input type="date" id="deliveryDate" required>

      <div class="price-display">Total Price: ₹<span id="price">39</span></div>
      <button onclick="submitOrder()">Submit</button>
    </div>
  </div>

  <script>
    const quantityInput = document.getElementById("quantity");
    const priceDisplay = document.getElementById("price");
    const todayInput = document.getElementById("todayDate");
    const deliveryInput = document.getElementById("deliveryDate");

    // Set today's date
    const today = new Date();
    todayInput.value = today.toISOString().split("T")[0];

    // Set min delivery date = today + 7 days
    const minDeliveryDate = new Date(today);
    minDeliveryDate.setDate(minDeliveryDate.getDate() + 7);
    deliveryInput.min = minDeliveryDate.toISOString().split("T")[0];

    // Update price dynamically
    quantityInput.addEventListener("input", () => {
      const qty = parseInt(quantityInput.value) || 1;
      priceDisplay.textContent = qty * 39;
    });

    // Swap main preview with clicked thumbnail
    function previewImage(imgElement) {
      const mainPreview = document.getElementById("mainPreview");
      let tempSrc = mainPreview.src;
      mainPreview.src = imgElement.src;
      imgElement.src = tempSrc;

      document.querySelectorAll(".thumbnails img").forEach(img => {
        img.style.borderColor = "transparent";
      });
      imgElement.style.borderColor = "#ff4d4d";
    }

    function submitOrder() {
      const name = document.getElementById("name").value.trim();
      const orderName = document.getElementById("orderName").value.trim();
      const address = document.getElementById("address").value.trim();
      const size = document.getElementById("size").value;
      const material = document.getElementById("material").value;
      const finish = document.getElementById("finish").value;
      const lamination = document.getElementById("lamination").value;
      const orientation = document.getElementById("orientation").value;
      const quantity = parseInt(document.getElementById("quantity").value);
      const todayDate = todayInput.value;
      const deliveryDate = deliveryInput.value;
      const price = quantity * 39;

      if (!name || !orderName || !address || quantity < 1 || !deliveryDate) {
        alert("⚠️ Please fill all required fields correctly.");
        return;
      }

      const newOrder = {
        customer: name,
        name: orderName,
        address,
        size,
        material,
        finish,
        lamination,
        orientation,
        quantity,
        orderType: "Poster",
        orderDate: todayDate,
        deliveryDate,
        totalPrice: price
      };

      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders.push(newOrder);
      localStorage.setItem("orders", JSON.stringify(orders));
      localStorage.setItem("orderCount", orders.length);

      alert("✅ Your Poster order has been placed!");
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>

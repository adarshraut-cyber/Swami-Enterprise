<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel | Swami Enterprise</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
body { display: flex; min-height: 100vh; background: #f4f4f4; color: #333; }
.sidebar { width: 220px; background: #222; color: #fff; padding: 20px 0; display: flex; flex-direction: column; }
.sidebar h2 { text-align: center; margin-bottom: 20px; }
.sidebar a { color: #fff; padding: 12px 20px; text-decoration: none; display: block; transition: 0.3s; font-size: 15px; }
.sidebar a:hover, .sidebar a.active { background: #ff4d4d; }
.main { flex: 1; padding: 20px; overflow-y: auto; }
h1 { margin-bottom: 20px; }
.cards { display: flex; gap: 20px; margin-bottom: 30px; }
.card { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 14px; }
th { background: #eee; }
.btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
.delete-btn { background: red; color: #fff; }
.complete-btn { background: green; color: #fff; }
.pay-btn { background: #007bff; color: #fff; }
.search-sort { display: flex; justify-content: space-between; margin-bottom: 10px; }
.search-sort input, .search-sort select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; }
.highlight { background-color: yellow; }
</style>
</head>
<body>
<div class="sidebar">
<h2>Admin</h2>
<a href="#" class="active" onclick="showSection('dashboard')">Dashboard</a>
<a href="#" onclick="showSection('orders')">Orders</a>
<a href="#" onclick="showSection('completed')">Completed Orders</a>
<a href="index.html">Logout</a>
</div>

<div class="main">
<section id="dashboardSection">
<h1>Dashboard</h1>
<div class="cards">
<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>
<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">₹0</p>
</div>
</div>
</section>

<section id="ordersSection" style="display:none;">
<h1>Active Orders</h1>
<div class="search-sort">
<input type="text" id="orderSearch" placeholder="Search by name...">
<input type="date" id="dateSearch">
<select id="orderSort">
<option value="asc">Ascending (Name)</option>
<option value="endDateAsc">End Date (Nearest First)</option>
<option value="endDateDesc">End Date (Farthest First)</option>
</select>
</div>
<table>
<thead>
<tr>
<th>No</th><th>Customer</th><th>Order Name</th><th>Type</th>
<th>Qty</th><th>Price</th><th>End Date</th><th>Address</th>
<th>Status</th><th>Actions</th>
</tr>
</thead>
<tbody id="ordersTable"></tbody>
</table>
</section>

<section id="completedSection" style="display:none;">
<h1>Completed Orders</h1>
<div class="search-sort">
<input type="text" id="completedSearch" placeholder="Search by name...">
<input type="date" id="completedDateSearch">
<select id="completedSort">
<option value="asc">Ascending (Name)</option>
<option value="endDateAsc">End Date (Nearest First)</option>
<option value="endDateDesc">End Date (Farthest First)</option>
</select>
</div>
<table>
<thead>
<tr>
<th>No</th><th>Customer</th><th>Order Name</th><th>Type</th>
<th>Qty</th><th>Price</th><th>End Date</th><th>Address</th>
<th>Status</th><th>Actions</th>
</tr>
</thead>
<tbody id="completedTable"></tbody>
</table>
</section>
</div>

<script>
function showSection(section) {
  document.getElementById("dashboardSection").style.display = "none";
  document.getElementById("ordersSection").style.display = "none";
  document.getElementById("completedSection").style.display = "none";
  document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));

  if(section==="dashboard") document.getElementById("dashboardSection").style.display="block";
  if(section==="orders") document.getElementById("ordersSection").style.display="block";
  if(section==="completed") document.getElementById("completedSection").style.display="block";

  if(section==="dashboard") document.querySelectorAll(".sidebar a")[0].classList.add("active");
  if(section==="orders") document.querySelectorAll(".sidebar a")[1].classList.add("active");
  if(section==="completed") document.querySelectorAll(".sidebar a")[2].classList.add("active");
}

function highlightText(text, search) {
  if(!search) return text;
  const regex = new RegExp(`(${search})`, 'gi');
  return text.replace(regex, `<span class="highlight">$1</span>`);
}

// Ensure every order has unique ID
function ensureUniqueIds() {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let changed = false;
  orders.forEach(o=>{
    if(!o.id) {
      o.id = Date.now().toString() + Math.floor(Math.random()*1000);
      changed = true;
    }
  });
  if(changed) localStorage.setItem("orders", JSON.stringify(orders));
}

function loadData() {
  ensureUniqueIds();
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  document.getElementById("totalOrders").textContent = orders.length;
  const totalRevenue = orders.reduce((sum,o)=>sum+(o.totalPrice||0),0);
  document.getElementById("totalRevenue").textContent = "₹" + totalRevenue;

  const nameSearch = document.getElementById("orderSearch").value.trim();
  const dateSearch = document.getElementById("dateSearch").value;
  const orderSort = document.getElementById("orderSort").value;

  const completedNameSearch = document.getElementById("completedSearch").value.trim();
  const completedDateSearch = document.getElementById("completedDateSearch").value;
  const completedSort = document.getElementById("completedSort").value;

  renderTable("ordersTable", orders.filter(o=>!o.completed), false, nameSearch, dateSearch, orderSort);
  renderTable("completedTable", orders.filter(o=>o.completed), true, completedNameSearch, completedDateSearch, completedSort);
}

function renderTable(tableId, data, isCompleted, nameSearch="", dateSearch="", sortOption="asc") {
  const tbody = document.getElementById(tableId);
  tbody.innerHTML = "";

  if(nameSearch) data = data.filter(o => (o.name||"").toLowerCase().includes(nameSearch.toLowerCase()));
  if(dateSearch) data = data.filter(o => o.deliveryDate && o.deliveryDate.startsWith(dateSearch));

  if(sortOption==="asc") data = data.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  if(sortOption==="endDateAsc") data = data.sort((a,b)=> new Date(a.deliveryDate||0) - new Date(b.deliveryDate||0));
  if(sortOption==="endDateDesc") data = data.sort((a,b)=> new Date(b.deliveryDate||0) - new Date(a.deliveryDate||0));

  if(data.length===0) {
    tbody.innerHTML = `<tr><td colspan="10">No orders found.</td></tr>`;
    return;
  }

  data.forEach((order,index)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${index+1}</td>
      <td>${highlightText(order.customer||"N/A", nameSearch)}</td>
      <td>${highlightText(order.name||"N/A", nameSearch)}</td>
      <td>${order.orderType||"N/A"}</td>
      <td>${order.quantity||0}</td>
      <td>₹${order.totalPrice||0}</td>
      <td>${highlightText(order.deliveryDate ? new Date(order.deliveryDate).toLocaleDateString() : "N/A", dateSearch)}</td>
      <td>${highlightText(order.address||"N/A", nameSearch)}</td>
      <td>${order.paid?"✅ Paid":"❌ Unpaid"}</td>
      <td>
        ${!isCompleted ? `<button class="complete-btn" onclick="markCompleted('${order.id}')">Completed</button>` : ""}
        <button class="delete-btn" onclick="deleteOrder('${order.id}')">🗑</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function markCompleted(id) {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  const order = orders.find(o => o.id == id);
  if(order) order.completed = true;
  localStorage.setItem("orders", JSON.stringify(orders));
  loadData();
}

function deleteOrder(id){
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders = orders.filter(o => o.id != id);
  localStorage.setItem("orders", JSON.stringify(orders));
  loadData();
}

["orderSearch","dateSearch","orderSort","completedSearch","completedDateSearch","completedSort"].forEach(id=>{
  document.getElementById(id).addEventListener("input", loadData);
  document.getElementById(id).addEventListener("change", loadData);
});

document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Your Order | Swami Enterprise</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <style>
    body {
      background: url('../images/eye.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
    }

    nav h1 {
      font-size: 26px;
    }

    .nav-links a {
      margin-left: 25px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ff4d4d;
    }

    .upload-container {
      max-width: 550px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 77, 77, 0.3);
    }

    .upload-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 12px 0 5px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    #totalPriceDisplay {
      font-weight: bold;
      text-align: right;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #ff4d4d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #e03e3e;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h1>Swami Enterprise</h1>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="create-order.html">Create</a>
      <a href="contact.html">Contact</a>
      <a href="signin.html">Logout</a>
    </div>
  </nav>

  <!-- Upload Form -->
  <div class="upload-container">
    <h2>Upload Image of Your Order</h2>
    <form id="orderForm">
      <label for="fullName">Your Full Name</label>
      <input type="text" id="fullName" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10-digit number" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" required>

      <label for="address">Delivery Address</label>
      <input type="text" id="address" required>

      <label for="orderName">Order Name</label>
      <input type="text" id="orderName" placeholder="this name will show on your total order list!!!" required>

      <label for="orderType">Select Type</label>
      <select id="orderType" required>
        <option value="">Choose type</option>
        <option value="Business Card">Business Card</option>
        <option value="Poster">Poster</option>
        <option value="T-shirt">T-shirt</option>
        <option value="Flyers">Flyers</option>
        <option value="Certificates">Certificates</option>
        <option value="Id-cards">Id-cards</option>
      </select>

      <label for="orderQuantity">Quantity</label>
      <input type="number" id="orderQuantity" min="1" value="1" required>

      <div id="totalPriceDisplay">Total Price: ₹0</div>

      <!-- Added Dates -->
      <label for="todayDate">Today's Date</label>
      <input type="text" id="todayDate" readonly required>

      <label for="deliveryDate">Choose Delivery Date</label>
      <input type="date" id="deliveryDate" required>

      <label for="orderFile">Upload File</label>
      <input type="file" id="orderFile" accept="image/*,.pdf" required>

      <button type="submit">Submit Order</button>
    </form>
  </div>

  <!-- JS -->
  <!-- Only the JS part updated -->
<script>
  const quantityInput = document.getElementById("orderQuantity");
  const orderTypeInput = document.getElementById("orderType");
  const totalPriceDisplay = document.getElementById("totalPriceDisplay");
  const deliveryDateInput = document.getElementById("deliveryDate");
  const orderFileInput = document.getElementById("orderFile");

  const prices = {
    "Business Card": 2,
    "Poster": 50,
    "T-shirt": 200,
    "Flyers": 5,
    "Certificates": 30,
    "Id-cards": 40
  };

  function updatePrice() {
    const quantity = parseInt(quantityInput.value) || 1;
    const type = orderTypeInput.value;
    const unitPrice = prices[type] || 0;
    const total = quantity * unitPrice;
    totalPriceDisplay.textContent = `Total Price: ₹${total}`;
  }

  const todayDateInput = document.getElementById("todayDate");
  const today = new Date();
  todayDateInput.value = today.toISOString().split("T")[0];

  const minDeliveryDate = new Date(today);
  minDeliveryDate.setDate(minDeliveryDate.getDate() + 7);
  deliveryDateInput.min = minDeliveryDate.toISOString().split("T")[0];

  quantityInput.addEventListener("input", updatePrice);
  orderTypeInput.addEventListener("change", updatePrice);

  document.getElementById("orderForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const name = document.getElementById("orderName").value.trim();
    const type = orderTypeInput.value;
    const quantity = parseInt(quantityInput.value);
    const unitPrice = prices[type] || 0;
    const totalPrice = quantity * unitPrice;
    const deliveryDate = deliveryDateInput.value;
    const orderFile = orderFileInput.files[0];

    if (!fullName || !phone || !email || !address || !name || !type || quantity < 1 || !deliveryDate || !orderFile) {
      alert("⚠️ Please fill out all fields and upload a file before submitting.");
      return;
    }

    const newOrder = {
      customer: fullName,
      phone,
      email,
      address,
      name,
      orderType: type,   // ✅ FIXED here
      quantity,
      totalPrice,
      orderDate: todayDateInput.value,
      deliveryDate
    };

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.push(newOrder);
    localStorage.setItem("orders", JSON.stringify(orders));

    let orderCount = parseInt(localStorage.getItem("orderCount")) || 0;
    orderCount++;
    localStorage.setItem("orderCount", orderCount);

    alert("✅ Your order has been placed!");
    document.getElementById("orderForm").reset();
    updatePrice();
    todayDateInput.value = today.toISOString().split("T")[0];
    deliveryDateInput.min = minDeliveryDate.toISOString().split("T")[0];
  });

  updatePrice();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Swami Enterprise</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .payment-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
      padding: 25px;
      text-align: center;
    }
    .payment-container h2 {
      margin-bottom: 10px;
      color: #333;
    }
    .amount-box {
      background: #f0f0f0;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
      font-size: 18px;
      font-weight: bold;
      color: #111;
    }
    .timer {
      font-size: 16px;
      color: #ff4444;
      margin-bottom: 15px;
    }
    .method-tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      margin: 0 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      background: #fafafa;
      transition: 0.3s;
    }
    .tab.active {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }
    .form-section {
      text-align: left;
      margin-top: 10px;
    }
    label {
      font-size: 14px;
      font-weight: 500;
      display: block;
      margin: 8px 0 3px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }
    input:focus {
      border-color: #007bff;
    }
    button {
      margin-top: 20px;
      background: #28a745;
      color: #fff;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #218838;
    }
    /* Receipt popup */
    .receipt-popup {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      justify-content: center; align-items: center;
    }
    .receipt-box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
    }
    .receipt-box h3 { margin-bottom: 10px; color: #333; }
    .download-btn {
      background: #007bff;
      color: #fff;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="payment-container">
    <h2>Complete Your Payment</h2>
    <div class="amount-box">
      Order: <span id="orderName"></span><br>
      Amount: ₹<span id="orderAmount"></span>
    </div>
    <div class="timer" id="countdown">15:00</div>

    <!-- Tabs -->
    <div class="method-tabs">
      <div class="tab active" onclick="switchMethod('upi')">UPI</div>
      <div class="tab" onclick="switchMethod('card')">Card</div>
      <div class="tab" onclick="switchMethod('netbanking')">Net Banking</div>
    </div>

    <!-- Forms -->
    <div class="form-section" id="upiForm">
      <label>UPI ID</label>
      <input type="text" id="upiId" placeholder="example@upi">
    </div>

    <div class="form-section" id="cardForm" style="display:none;">
      <label>Card Number</label>
      <input type="text" maxlength="16" placeholder="xxxx xxxx xxxx xxxx">
      <label>Expiry</label>
      <input type="text" placeholder="MM/YY">
      <label>CVV</label>
      <input type="password" maxlength="3" placeholder="***">
    </div>

    <div class="form-section" id="netbankingForm" style="display:none;">
      <label>Select Bank</label>
      <input type="text" placeholder="Bank Name">
    </div>

    <label for="customerId">Customer ID</label>
    <input type="text" id="customerId" placeholder="Enter your ID">

    <button id="payBtn">Confirm & Pay</button>
  </div>

  <!-- Receipt -->
  <div class="receipt-popup" id="receiptPopup">
    <div class="receipt-box" id="receiptBox">
      <h3>Payment Receipt</h3>
      <p><strong>Order:</strong> <span id="rOrderName"></span></p>
      <p><strong>Payment ID:</strong> <span id="rPaymentId"></span></p>
      <p><strong>Customer ID:</strong> <span id="rCustomerId"></span></p>
      <p><strong>Amount:</strong> ₹<span id="rAmount"></span></p>
      <p><strong>Method:</strong> <span id="rMethod"></span></p>
      <p><strong>Date:</strong> <span id="rDate"></span></p>
      <p><strong>Status:</strong> ✅ Paid</p>
      <p style="color: green; font-size: 14px;">Redirecting to dashboard...</p>
      <button class="download-btn" onclick="downloadReceipt()">Download Receipt</button>
    </div>
  </div>

  <script>
    // Get selected order index
    const orderIndex = localStorage.getItem("selectedOrderIndex");
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    const order = (orderIndex !== null && orders[orderIndex]) ? orders[orderIndex] : null;

    if (order) {
      document.getElementById("orderName").textContent = order.name;
      document.getElementById("orderAmount").textContent = order.totalPrice;
    }

    // Tabs switch
    function switchMethod(method) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".form-section").forEach(f => f.style.display = "none");
      if (method === "upi") { document.querySelectorAll(".tab")[0].classList.add("active"); document.getElementById("upiForm").style.display = "block"; }
      if (method === "card") { document.querySelectorAll(".tab")[1].classList.add("active"); document.getElementById("cardForm").style.display = "block"; }
      if (method === "netbanking") { document.querySelectorAll(".tab")[2].classList.add("active"); document.getElementById("netbankingForm").style.display = "block"; }
    }

    // Timer
    const countdownEl = document.getElementById("countdown");
    let timeLeft = 15 * 60;
    const timer = setInterval(() => {
      const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      countdownEl.textContent = `${m}:${s < 10 ? "0" : ""}${s}`;
      if (timeLeft <= 0) {
        clearInterval(timer);
        countdownEl.textContent = "Expired";
        document.getElementById("payBtn").disabled = true;
      }
      timeLeft--;
    }, 1000);

    // Pay
    document.getElementById("payBtn").addEventListener("click", () => {
      const method = document.querySelector(".tab.active").innerText;
      const customerId = document.getElementById("customerId").value;
      if (!customerId) { alert("Enter your Customer ID"); return; }

      const paymentId = "PAY" + Math.floor(Math.random()*1000000);

      document.getElementById("rOrderName").textContent = order.name;
      document.getElementById("rPaymentId").textContent = paymentId;
      document.getElementById("rCustomerId").textContent = customerId;
      document.getElementById("rAmount").textContent = order.totalPrice;
      document.getElementById("rMethod").textContent = method;
      document.getElementById("rDate").textContent = new Date().toLocaleString();

      document.getElementById("receiptPopup").style.display = "flex";

      // Update correct order
      if (orderIndex !== null && orders[orderIndex]) {
        orders[orderIndex].paid = true;
        orders[orderIndex].paymentId = paymentId;
        orders[orderIndex].paymentDate = new Date().toLocaleString();
        localStorage.setItem("orders", JSON.stringify(orders));
      }

      // Redirect to dashboard after 5 sec
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 5000);
    });

    function downloadReceipt() {
      const content = document.getElementById("receiptBox").innerText;
      const blob = new Blob([content], {type:"text/plain"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "Payment_Receipt.txt";
      link.click();
    }
  </script>
</body>
</html>
